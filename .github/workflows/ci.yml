name: citybike-ci

on:
  push:
  pull_request:

jobs:
  validate-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install -g @apidevtools/swagger-cli

      - run: swagger-cli validate openapi/user-service.yaml
      - run: swagger-cli validate openapi/ride-service.yaml
      - run: swagger-cli validate openapi/bike-inventory-service.yaml
      - run: swagger-cli validate openapi/payment-service.yaml
      - run: swagger-cli validate openapi/partner-analytics-service.yaml

  build-and-smoke:
    runs-on: ubuntu-latest
    needs: validate-openapi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci || npm install

      - run: docker compose up -d --build

      - name: Wait for all services healthy (shell poll)
        run: |
          echo "Waiting for containers to become healthy..."
          for svc in user-service ride-service bike-inventory-service payment-service partner-analytics-service; do
            for i in $(seq 1 40); do
              status=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q $svc) 2>/dev/null || echo "unknown")
              echo "  $svc: $status (attempt $i)"
              if [ "$status" = "healthy" ]; then break; fi
              if [ $i -eq 40 ]; then
                echo "ERROR: $svc did not become healthy in time"
                docker compose logs $svc
                exit 1
              fi
              sleep 3
            done
          done

      - name: Smoke test all /status endpoints
        run: |
          for port in 3001 3002 3003 3004 3005; do
            echo "Smoke testing http://localhost:$port/status"
            curl --fail --silent http://localhost:$port/status
            echo
          done

      - name: Print logs on failure
        if: failure()
        run: docker compose logs

      - if: always()
        run: docker compose down

  contract-tests:
    runs-on: ubuntu-latest
    needs: build-and-smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install schemathesis

      - run: docker compose up -d --build

      - name: Wait for all services healthy (shell poll)
        run: |
          echo "Waiting for containers to become healthy..."
          for svc in user-service ride-service bike-inventory-service payment-service partner-analytics-service; do
            for i in $(seq 1 40); do
              status=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q $svc) 2>/dev/null || echo "unknown")
              echo "  $svc: $status (attempt $i)"
              if [ "$status" = "healthy" ]; then break; fi
              if [ $i -eq 40 ]; then
                echo "ERROR: $svc did not become healthy in time"
                docker compose logs $svc
                exit 1
              fi
              sleep 3
            done
          done

      - name: Print logs on failure
        if: failure()
        run: docker compose logs

      - name: Run user service contract tests
        run: |
          schemathesis run openapi/user-service.yaml \
            --url http://localhost:3001 \
            -H "Authorization: Bearer $USER_JWT" \
            2>&1 | tee schemathesis-user.log
        env:
          USER_JWT: ${{ secrets.USER_JWT }}

      - name: Run ride service contract tests (user routes)
        run: |
          schemathesis run openapi/ride-service.yaml \
            --url http://localhost:3002 \
            -H "Authorization: Bearer $USER_JWT" \
            2>&1 | tee schemathesis-ride-user.log
        env:
          USER_JWT: ${{ secrets.USER_JWT }}

      - name: Run ride service contract tests (internal routes)
        run: |
          schemathesis run openapi/ride-service.yaml \
            --url http://localhost:3002 \
            --endpoint '/v1/internal/.*' \
            -H "Authorization: Bearer $INTERNAL_JWT" \
            2>&1 | tee schemathesis-ride-internal.log
        env:
          INTERNAL_JWT: ${{ secrets.INTERNAL_JWT }}

      - name: Run bike inventory service contract tests
        run: |
          schemathesis run openapi/bike-inventory-service.yaml \
            --url http://localhost:3003 \
            -H "Authorization: Bearer $USER_JWT" \
            -H "X-Device-Key: $DEVICE_API_KEY" \
            2>&1 | tee schemathesis-bike-inventory.log
        env:
          USER_JWT: ${{ secrets.USER_JWT }}
          DEVICE_API_KEY: ${{ secrets.DEVICE_API_KEY }}

      - name: Run payment service contract tests
        run: |
          schemathesis run openapi/payment-service.yaml \
            --url http://localhost:3004 \
            -H "Authorization: Bearer $INTERNAL_JWT" \
            2>&1 | tee schemathesis-payment.log
        env:
          INTERNAL_JWT: ${{ secrets.INTERNAL_JWT }}

      - name: Run partner analytics service contract tests
        run: |
          schemathesis run openapi/partner-analytics-service.yaml \
            --url http://localhost:3005 \
            -H "X-Api-Key: $PARTNER_API_KEY" \
            -H "X-Partner-Id: partner-citycouncil-01" \
            2>&1 | tee schemathesis-partner-analytics.log
        env:
          PARTNER_API_KEY: ${{ secrets.PARTNER_API_KEY }}

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-logs
          path: schemathesis-*.log

      - if: always()
        run: docker compose down

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm audit --audit-level=high
